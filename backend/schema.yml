          application/json:
            schema:
              $ref: '#/components/schemas/PatchedHelper'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedHelper'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedHelper'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Helper'
          description: ''
    delete:
      operationId: helpers_destroy
      description: |-
        Provides CRUD operations for helper profiles.

        This ViewSet allows authenticated users to create,
        retrieve, update, and delete helper records. Helper
