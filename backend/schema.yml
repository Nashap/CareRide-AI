components:
  schemas:
    AIRecommendation:
      type: object
      properties:
        travel_request_id:
          type: integer
      required:
      - travel_request_id
    AssistanceLevelEnum:
      enum:
      - Low
      - Medium
      - High
      type: string
      description: |-
        * `Low` - Low
        * `Medium` - Medium
        * `High` - High
    AssistanceTypeEnum:
      enum:
      - Wheelchair assistance
      - Walker support
      - Crutches support
      - Walking assistance
      - Travel companion
      - Hospital visit
      - Shopping help
      - Govt. office help
      - Elderly care
      - Visually impaired
      - Hearing impaired
      - Post-surgery
      type: string
      description: |-
        * `Wheelchair assistance` - Wheelchair assistance
        * `Walker support` - Walker support
        * `Crutches support` - Crutches support
        * `Walking assistance` - Walking assistance
        * `Travel companion` - Travel companion
        * `Hospital visit` - Hospital visit
        * `Shopping help` - Shopping help
        * `Govt. office help` - Govt. office help
        * `Elderly care` - Elderly care
        * `Visually impaired` - Visually impaired
        * `Hearing impaired` - Hearing impaired
        * `Post-surgery` - Post-surgery
    Helper:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        auth_user_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          maxLength: 100
        skills:
          type: string
        rating:
          type: number
          format: double
        availability:
          type: boolean
      required:
      - id
      - name
      - skills
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    PaginatedHelperList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Helper'
    PaginatedTravelRequestList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/TravelRequest'
    PatchedHelper:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        auth_user_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          maxLength: 100
        skills:
          type: string
        rating:
          type: number
          format: double
        availability:
          type: boolean
    PatchedTravelRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        pickup_location:
          type: string
          maxLength: 255
        destination:
          type: string
          maxLength: 255
        travel_date:
          type: string
          format: date
        service_type:
          $ref: '#/components/schemas/ServiceTypeEnum'
        assistance_type:
          $ref: '#/components/schemas/AssistanceTypeEnum'
        assistance_level:
          $ref: '#/components/schemas/AssistanceLevelEnum'
        additional_note:
          type: string
          nullable: true
        status:
          type: string
          maxLength: 20
        created_at:
          type: string
          format: date-time
          readOnly: true
        passenger:
          type: integer
    Register:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 6
      required:
      - email
      - password
    ServiceTypeEnum:
      enum:
      - Hospital visit
      - Govt. office
      - Shopping
      - School / Work
      - Religious place
      - Other
      type: string
      description: |-
        * `Hospital visit` - Hospital visit
        * `Govt. office` - Govt. office
        * `Shopping` - Shopping
        * `School / Work` - School / Work
        * `Religious place` - Religious place
        * `Other` - Other
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TravelRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        pickup_location:
          type: string
          maxLength: 255
        destination:
          type: string
          maxLength: 255
        travel_date:
          type: string
          format: date
        service_type:
          $ref: '#/components/schemas/ServiceTypeEnum'
        assistance_type:
          $ref: '#/components/schemas/AssistanceTypeEnum'
        assistance_level:
          $ref: '#/components/schemas/AssistanceLevelEnum'
        additional_note:
          type: string
          nullable: true
        status:
          type: string
          maxLength: 20
        created_at:
          type: string
          format: date-time
          readOnly: true
        passenger:
          type: integer
      required:
      - assistance_type
      - created_at
      - destination
      - id
      - passenger
      - pickup_location
      - service_type
      - travel_date
    UploadCertificate:
      type: object
      properties:
        file:
          type: string
          format: uri
      required:
      - file
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
