              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/travel-requests/:
    get:
      operationId: travel_requests_list
      description: |-
        Provides CRUD operations for travel requests.

        This ViewSet allows authenticated users to create,
        retrieve, update, and delete travel assistance requests.
        It also supports filtering by service type, assistance type,
        assistance level, and request status to simplify request
        management and helper matching.
      parameters:
      - in: query
        name: assistance_level
        schema:
          type: string
          enum:
          - High
          - Low
          - Medium
        description: |-
          * `Low` - Low
          * `Medium` - Medium
          * `High` - High
      - in: query
        name: assistance_type
        schema:
          type: string
          enum:
          - Crutches support
          - Elderly care
          - Govt. office help
          - Hearing impaired
          - Hospital visit
          - Post-surgery
          - Shopping help
          - Travel companion
          - Visually impaired
          - Walker support
          - Walking assistance
          - Wheelchair assistance
        description: |-
          * `Wheelchair assistance` - Wheelchair assistance
          * `Walker support` - Walker support
          * `Crutches support` - Crutches support
          * `Walking assistance` - Walking assistance
          * `Travel companion` - Travel companion
          * `Hospital visit` - Hospital visit
          * `Shopping help` - Shopping help
          * `Govt. office help` - Govt. office help
          * `Elderly care` - Elderly care
          * `Visually impaired` - Visually impaired
          * `Hearing impaired` - Hearing impaired
          * `Post-surgery` - Post-surgery
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: service_type
        schema:
          type: string
          enum:
          - Govt. office
          - Hospital visit
          - Other
          - Religious place
          - School / Work
          - Shopping
        description: |-
          * `Hospital visit` - Hospital visit
          * `Govt. office` - Govt. office
          * `Shopping` - Shopping
          * `School / Work` - School / Work
          * `Religious place` - Religious place
          * `Other` - Other
      - in: query
        name: status
        schema:
          type: string
      tags:
      - travel-requests
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTravelRequestList'
          description: ''
    post:
      operationId: travel_requests_create
      description: |-
        Provides CRUD operations for travel requests.

        This ViewSet allows authenticated users to create,
        retrieve, update, and delete travel assistance requests.
        It also supports filtering by service type, assistance type,
        assistance level, and request status to simplify request
        management and helper matching.
      tags:
      - travel-requests
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TravelRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TravelRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TravelRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelRequest'
          description: ''
