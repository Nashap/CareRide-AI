openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/ai/recommend-helper/:
    post:
      operationId: ai_recommend_helper_create
      description: "\n    Uses Gemini AI to analyze a travel request and generate\n
        \   ranked helper recommendations.\n\n    The generated recommendations are
        stored in Supabase.\n    "
      summary: Generate AI Helper Recommendation
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIRecommendation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIRecommendation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIRecommendation'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/helpers/:
    get:
      operationId: helpers_list
      description: |-
        Provides CRUD operations for helper profiles.

        This ViewSet allows authenticated users to create,
        retrieve, update, and delete helper records. Helper
        information includes skills, availability status,
        and ratings used by the AI recommendation system
        to match helpers with travel requests.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - helpers
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHelperList'
          description: ''
    post:
      operationId: helpers_create
      description: |-
        Provides CRUD operations for helper profiles.

        This ViewSet allows authenticated users to create,
        retrieve, update, and delete helper records. Helper
        information includes skills, availability status,
        and ratings used by the AI recommendation system
        to match helpers with travel requests.
      tags:
      - helpers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Helper'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Helper'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Helper'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Helper'
          description: ''
